<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Card Preview</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./images/favicon-32x32.png" type="image/x-icon">
</head>
<body>
    <main class="card">
        <img id="nft-image" src="images/image-equilibrium.jpg" alt="NFT">
        <div class="seen-color">
            <img id="nft-view" src="images/icon-view.svg" alt="img seen">
        </div> 

        <section class="nft-text">
            <h1 id="title" class="hover">Equilibrium #3429</h1>
            <p class="text" id="text-principal">Our Equilibrium collection promotes balance and calm.</p>
            <div class="nft-info">
                <div id="nft-ethereum">
                    <img src="images/icon-ethereum.svg" alt="ethereum">
                    <p id="eth">0.041 ETH</p>
                </div>
                <div id="nft-clock">
                    <img src="images/icon-clock.svg" alt="clock">
                    <p class="text">3 days left</p>
                </div>
            </div>
        </section>

        <hr>

        <section class="nft-creator">
            <img src="images/image-avatar.png" alt="Creator">
            <p class="text">Creation of</p>
            <p id="name-creator" class="hover">Jules Wyvern</p>
        </section>
    </main>

    <footer>
        <p>Challenger by <a href="https://www.frontendmentor.io/challenges/nft-preview-card-component-SbdUL_w0U">Frontend Mentor</a></p>
        <p>Coded by <a href="https://github.com/JadielSilva11">Jadiel Silva</a></p>
    </footer>
</body>
</html>
